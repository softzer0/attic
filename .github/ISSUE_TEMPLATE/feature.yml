name: Feature request
description: Propose a focused capability or API change
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the use case and why current APIs cannot address it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Consistency and compatibility tradeoffs
