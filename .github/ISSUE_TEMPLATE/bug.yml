name: Bug report
description: Report reproducible incorrect behavior
body:
  - type: input
    id: version
    attributes:
      label: Attic version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node, Prisma, PostgreSQL, Redis, framework, and deployment topology.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
