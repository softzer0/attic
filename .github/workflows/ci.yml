name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: attic
          POSTGRES_USER: attic
          POSTGRES_PASSWORD: attic
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U attic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://attic:attic@localhost:5432/attic
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node tests/consumers/esm.mjs
      - run: node tests/consumers/commonjs.cjs
      - if: matrix.node == 22
        run: pnpm pack:check

  prisma-7-minimum-nest-10:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add --save-dev --lockfile=false prisma@7.0.0 @prisma/client@7.0.0 @nestjs/common@10.4.20 @nestjs/core@10.4.20 @nestjs/testing@10.4.20
      # Prisma 7.0's generated client contains non-portable inferred declarations.
      # Attic's real build still validates declarations against the current Prisma release.
      - run: pnpm generate:test-client && pnpm exec tsc --noEmit --declaration false --declarationMap false
      - run: pnpm test:unit
